[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_pgsql", "php84Extensions.pgsql", "php84Extensions.intl", "php84Extensions.zip", "php84Extensions.openssl", "openssl", "composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
cmd = "php bin/console cache:clear && php bin/console doctrine:migrations:migrate --no-interaction && php -S 0.0.0.0:8000 public/index.php"